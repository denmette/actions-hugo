name: CI Security

on:
  workflow_call:

jobs:
  sast:
    name: SAST (zizmor)
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      contents: read
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@v2.18.0
        with:
          egress-policy: audit

      - uses: actions/checkout@v6

      - name: Run zizmor
        uses: zizmorcore/zizmor-action@v0.5.2
        with:
          inputs: |
            .github/workflows
            action.yml
          persona: auditor
          min-severity: medium

  codeql:
    name: CodeQL
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@v2.18.0
        with:
          egress-policy: audit

      - uses: actions/checkout@v6

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: javascript

      - name: Autobuild
        uses: github/codeql-action/autobuild@v4

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4

  dependency-review:
    name: Dependency Review
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@v2.18.0
        with:
          egress-policy: audit

      - uses: actions/checkout@v6
      - uses: actions/dependency-review-action@v4
        with:
          comment-summary-in-pr: always
