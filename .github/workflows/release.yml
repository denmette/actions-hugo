name: Release

on:
  workflow_run:
    workflows:
      - 'CI/CD Pipeline'
    types:
      - completed
  workflow_dispatch:

permissions:
  contents: write
  issues: write
  pull-requests: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    if: >
      github.event_name == 'workflow_dispatch' ||
      (
        github.event_name == 'workflow_run' &&
        github.event.workflow_run.conclusion == 'success' &&
        github.event.workflow_run.head_branch == 'main' &&
        !startsWith(github.event.workflow_run.head_commit.message, 'chore(release):') &&
        !contains(github.event.workflow_run.head_commit.message, '[skip ci]')
      )
    runs-on: ubuntu-latest
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@v2.18.0
        with:
          egress-policy: audit

      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.GH_TOKEN }}
          ref: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.sha }}

      - uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      - run: corepack enable

      - run: corepack install

      - run: corepack npm ci

      - run: corepack npm run build

      - name: Verify committed bundle is up to date
        run: git diff --exit-code -- lib

      - name: Run semantic-release
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: corepack npm exec semantic-release
