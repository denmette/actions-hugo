name: Release

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  release:
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Create release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG_NAME="${GITHUB_REF##refs/tags/}"
          RELEASE_NAME="$(jq -r '.name' ./package.json)"
          {
            printf '%s %s\n\n' "${RELEASE_NAME}" "${TAG_NAME}"
            printf 'See [CHANGELOG.md](https://github.com/%s/blob/%s/CHANGELOG.md) for more details.\n' "${GITHUB_REPOSITORY}" "${TAG_NAME}"
          } > ./release_notes.md
          gh release create "${TAG_NAME}" \
            --draft \
            --prerelease \
            --notes-file ./release_notes.md \
            --title "${RELEASE_NAME} ${TAG_NAME}"
