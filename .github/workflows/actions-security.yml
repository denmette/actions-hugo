name: GitHub Actions Security

on:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/**'
      - 'action.yml'
  pull_request:
    paths:
      - '.github/workflows/**'
      - 'action.yml'
  workflow_dispatch:

permissions:
  contents: read
  security-events: write

jobs:
  zizmor:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Run zizmor
        uses: zizmorcore/zizmor-action@71321a20a9ded102f6e9ce5718a2fcec2c4f70d8 # v0.5.2
        with:
          inputs: |
            .github/workflows
            action.yml
          persona: auditor
          min-severity: medium
