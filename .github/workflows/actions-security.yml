name: GitHub Actions Security

on:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/**'
      - 'action.yml'
  pull_request:
    paths:
      - '.github/workflows/**'
      - 'action.yml'
  workflow_dispatch:

permissions:
  contents: read
  security-events: write

jobs:
  zizmor:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v6

      - name: Run zizmor
        uses: zizmorcore/zizmor-action@e639db99335bc9038abc0e066dfcd72e23d26fb4 # v0.3.0
        with:
          inputs: |
            .github/workflows
            action.yml
          persona: auditor
          min-severity: medium
