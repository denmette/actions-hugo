name: 'Test'

on:
  push:
    branches:
      - main
    paths-ignore:
      - '**.md'
  pull_request:
    paths-ignore:
      - '**.md'

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - 'ubuntu-22.04'
          - 'ubuntu-latest'
          - 'macos-latest'
          - 'windows-latest'
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      - run: npm install --global npm@11.12.1

      - run: npm ci

      - name: Run prettier
        run: npm run format:check

      - name: Run eslint
        run: npm run lint

      - name: Run TypeScript compiler
        run: npm run tsc

      - name: Build bundled action
        run: npm run build

      - run: npm test

      - name: Upload test coverage as artifact
        if: matrix.os == 'ubuntu-latest'
        uses: actions/upload-artifact@v7
        with:
          name: coverage-${{ matrix.os }}
          path: coverage

      - if: matrix.os == 'ubuntu-latest'
        uses: codecov/codecov-action@v6

  verify-bundle:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      - run: npm install --global npm@11.12.1

      - run: npm ci

      - name: Build bundled action
        run: npm run build

      - name: Verify committed bundle is up to date
        run: git diff --exit-code -- lib
