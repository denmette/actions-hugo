name: CI Testing

on:
  workflow_call:
    inputs:
      lib-artifact-name:
        required: true
        type: string

jobs:
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@4d991eb9b905e20b33c5284eb99778e874838644 # v2.11.0
        with:
          egress-policy: audit

      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - uses: actions/setup-node@1d0ff469b7ec7b3cb9d8673fde0c81c483a2134b # v4.2.0
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      - run: corepack enable
      - run: corepack install
      - run: corepack npm ci

      - name: Run lint
        run: corepack npm run lint

      - name: Run prettier
        run: corepack npm run format:check

  unit-test:
    name: Unit Tests (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - 'ubuntu-22.04'
          - 'ubuntu-latest'
          - 'macos-latest'
          - 'windows-latest'
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@4d991eb9b905e20b33c5284eb99778e874838644 # v2.11.0
        with:
          egress-policy: audit

      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - uses: actions/setup-node@1d0ff469b7ec7b3cb9d8673fde0c81c483a2134b # v4.2.0
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      - run: corepack enable
      - run: corepack install
      - run: corepack npm ci

      - name: Download built lib artifact
        uses: actions/download-artifact@cc203385981b70ca67e1cc392babf9cc229d5806 # v4.1.9
        with:
          name: ${{ inputs.lib-artifact-name }}
          path: lib

      - name: Run unit tests
        run: corepack npm test

      - name: Upload test coverage as artifact
        if: matrix.os == 'ubuntu-latest'
        uses: actions/upload-artifact@4cea3ca74a44f3319808383c39686809633ee353 # v4.6.1
        with:
          name: coverage-${{ matrix.os }}
          path: coverage

      - if: matrix.os == 'ubuntu-latest'
        uses: codecov/codecov-action@0565863a31f2c772f9f0395002a31e3f06189574 # v5.4.0

  smoke-test:
    name: Smoke Test (${{ matrix.os }}, ext=${{ matrix.extended }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - 'ubuntu-22.04'
          - 'macos-latest'
          - 'windows-latest'
        extended: [true, false]
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@4d991eb9b905e20b33c5284eb99778e874838644 # v2.11.0
        with:
          egress-policy: audit

      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Download built lib artifact
        uses: actions/download-artifact@cc203385981b70ca67e1cc392babf9cc229d5806 # v4.1.9
        with:
          name: ${{ inputs.lib-artifact-name }}
          path: lib

      - name: Cache Hugo
        uses: actions/cache@d4323d4df104b026a6aa633fdb11d772146be0bf # v4.2.2
        with:
          path: |
            ${{ runner.temp }}/hugo_cache
            ${{ env.RUNNER_TEMP }}/hugo_cache
          key: ${{ runner.os }}-hugo-${{ hashFiles('**/action.yml') }}
          restore-keys: |
            ${{ runner.os }}-hugo-

      - name: Setup Hugo (Latest)
        uses: ./
        with:
          hugo-version: 'latest'
          extended: ${{ matrix.extended }}

      - name: Run hugo version
        run: hugo version
