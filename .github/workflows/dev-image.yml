name: 'Dev Image CI'

on:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/dev-image.yml'
      - '.dockerignore'
      - '.nvmrc'
      - 'Dockerfile'
      - 'Makefile'
  pull_request:
    types:
      - opened
      - synchronize
    paths:
      - '.github/workflows/dev-image.yml'
      - '.dockerignore'
      - '.nvmrc'
      - 'Dockerfile'
      - 'Makefile'

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  dev-image-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - run: make build
      - run: make cirun cmd="corepack npm ci"
      - run: make cirun cmd="corepack npm run format:check"
      - run: make cirun cmd="corepack npm run lint"
      - run: make cirun cmd="corepack npm run tsc"
      - run: make cirun cmd="corepack npm test"
