project_name: "Actions Hugo"
default_status: "To Do"
statuses: ["To Do", "In Progress", "Done"]
labels: []
definition_of_done: ["Feature branch created for the task", "Relevant local tests pass before completion", "Changes are committed with conventional commit messages", "Backlog task notes and status are kept current during execution"]
date_format: yyyy-mm-dd
max_column_width: 20
default_editor: "nano"
auto_open_browser: true
default_port: 6420
remote_operations: true
auto_commit: true
zero_padded_ids: 4
bypass_git_hooks: false
check_active_branches: true
active_branch_days: 15
task_prefix: "task"
